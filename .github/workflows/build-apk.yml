name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install

      - name: Verify node_modules exists
        run: |
          echo "Node modules path: $(pwd)/node_modules"
          ls node_modules/@react-native/gradle-plugin

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK Debug
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          cd android
          ../node_modules/.bin/react-native --version || true
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -50

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
